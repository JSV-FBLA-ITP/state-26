<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B47"/>
      <stop offset="100%" stop-color="#E85A38"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Paw print icon - white -->
  <g transform="translate(256,240)" fill="#FFFFFF">
    <!-- Main pad -->
    <ellipse cx="0" cy="40" rx="72" ry="60"/>
    <!-- Top-left toe -->
    <ellipse cx="-70" cy="-40" rx="32" ry="40" transform="rotate(-15 -70 -40)"/>
    <!-- Top-right toe -->  
    <ellipse cx="70" cy="-40" rx="32" ry="40" transform="rotate(15 70 -40)"/>
    <!-- Inner-left toe -->
    <ellipse cx="-28" cy="-70" rx="28" ry="36" transform="rotate(-5 -28 -70)"/>
    <!-- Inner-right toe -->
    <ellipse cx="28" cy="-70" rx="28" ry="36" transform="rotate(5 28 -70)"/>
  </g>
</svg>
